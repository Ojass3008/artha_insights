# Scheduled meta-allocator run (alternative / recommended primary to the
# Vercel Python cron). GitHub Actions has no bundle-size limit and no cold
# start, which suits numpy/pandas batch compute better than serverless.
#
# Set repository secrets: SUPABASE_URL (or VITE_SUPABASE_URL) and
# SUPABASE_SERVICE_ROLE_KEY. Without them the job runs and prints the decision
# but skips persistence (the pipeline degrades gracefully).
#
# If you use THIS, you can drop the allocate entry from vercel.json to avoid
# running the pipeline twice. Pick one scheduler.

name: meta-allocator

on:
  schedule:
    - cron: "0 12 * * *" # daily 12:00 UTC, after the market/news crons
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  allocate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: quant
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run meta-allocator pipeline (persist to Supabase)
        working-directory: quant
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m artha_quant.run --persist
